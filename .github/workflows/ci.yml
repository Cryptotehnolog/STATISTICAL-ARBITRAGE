name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check user-facing Russian text
        shell: pwsh
        run: ./scripts/check_user_facing_russian.ps1

      - name: Check secret leaks
        shell: pwsh
        run: ./scripts/check_secret_leaks.ps1

      - name: Check pair alignment boundary
        shell: pwsh
        run: ./scripts/check_pair_alignment_boundary.ps1

      - name: Check research defaults
        shell: pwsh
        run: ./scripts/check_research_defaults.ps1

      - name: Check Hypothesis Agent boundaries
        shell: pwsh
        run: ./scripts/check_hypothesis_agent_boundaries.ps1

      - name: Check Backtest Agent boundaries
        shell: pwsh
        run: ./scripts/check_backtest_agent_boundaries.ps1

      - name: Check Critic Agent boundaries
        shell: pwsh
        run: ./scripts/check_critic_agent_boundaries.ps1

      - name: Check Critic Agent pipeline
        shell: pwsh
        run: ./scripts/check_critic_pipeline.ps1

      - name: Check Report Agent pipeline
        shell: pwsh
        run: ./scripts/check_report_pipeline.ps1

      - name: Check property and integration smoke tests
        shell: pwsh
        run: ./scripts/check_property_integration.ps1

      - name: Run Ruff
        run: uv run ruff check --no-cache src tests

      - name: Run mypy
        run: uv run mypy src

      - name: Run unit tests
        run: >
          uv run pytest tests/unit -m "not slow"
          --cov=stat_arb.agents
          --cov=stat_arb.backtest
          --cov=stat_arb.data_quality
          --cov=stat_arb.domain
          --cov=stat_arb.ingestion
          --cov=stat_arb.memory
          --cov=stat_arb.statistical
          --cov=stat_arb.storage
          --cov-report=term
          --cov-fail-under=70
          -p no:cacheprovider
