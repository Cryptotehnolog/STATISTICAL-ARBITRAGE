name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check user-facing Russian text
        shell: pwsh
        run: ./scripts/check_user_facing_russian.ps1

      - name: Check secret leaks
        shell: pwsh
        run: ./scripts/check_secret_leaks.ps1

      - name: Check pair alignment boundary
        shell: pwsh
        run: ./scripts/check_pair_alignment_boundary.ps1

      - name: Run Ruff
        run: uv run ruff check --no-cache src tests

      - name: Run unit tests
        run: uv run pytest tests/unit -m "not slow" --no-cov -p no:cacheprovider
